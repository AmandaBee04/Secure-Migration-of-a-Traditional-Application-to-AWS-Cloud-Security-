[www]
user = www-data
group = www-data

; Listen on TCP — matches nginx fastcgi_pass
listen = 127.0.0.1:9000

; ondemand: workers only spawn when a request arrives, die when idle
; This avoids idle workers crashing spontaneously
pm = ondemand
pm.max_children = 5
pm.process_idle_timeout = 10s
pm.max_requests = 500

; Log every request to stderr (visible in CloudWatch)
access.log = /proc/self/fd/2
access.format = "[FPM] %R \"%m %r\" %s %{mili}d ms"

; Catch slow requests
slowlog = /proc/self/fd/2
request_slowlog_timeout = 10s

; Kill runaway requests after 60s
request_terminate_timeout = 60s

; Log worker exit reasons
catch_workers_output = yes
